screen = \
    [ShadowQuality] [BloomGlow] \
    [GodRays] [OutlineStyle] \
    [DayNight] [ColorGrading] \
    [Waves] [AntiAliasing]

    screen.ShadowQuality = \
        SHADOW_MAP_RESOLUTION PCF_RADIUS \
        PCF_SPREAD COLORED_SHADOW_SATURATION

    screen.BloomGlow = \
        BLOOM_THRESHOLD BLOOM_INTENSITY \
        BLOOM_BLUR_RADIUS_X BLOOM_BLUR_RADIUS_Y \
        BLOOM_DISTANCE_FADE_START BLOOM_DISTANCE_FADE_END

    screen.GodRays = \
        GODRAY_INTENSITY GODRAY_SAMPLES \
        GODRAY_DECAY GODRAY_DENSITY

    screen.OutlineStyle = \
        OUTLINE_STRENGTH OUTLINE_BRIGHTNESS \
        OUTLINE_BASE_THICKNESS <empty>

    screen.DayNight = \
        EXPOSURE_SUNRISE EXPOSURE_NOON \
        EXPOSURE_SUNSET EXPOSURE_MIDNIGHT

    screen.ColorGrading = \
        GRADE_SATURATION GRADE_SHADOW_LIFT \
        GRADE_CONTRAST <empty>

    screen.Waves = \
        FOLIAGE_WAVE_STRENGTH WATER_WAVE_STRENGTH
        
    screen.AntiAliasing = \
        ANTIALIASING

sliders = \
    SHADOW_MAP_RESOLUTION PCF_RADIUS PCF_SPREAD COLORED_SHADOW_SATURATION \
    BLOOM_THRESHOLD BLOOM_INTENSITY BLOOM_BLUR_RADIUS_X BLOOM_BLUR_RADIUS_Y BLOOM_DISTANCE_FADE_START BLOOM_DISTANCE_FADE_END \
    GODRAY_INTENSITY GODRAY_SAMPLES GODRAY_DECAY GODRAY_DENSITY \
    OUTLINE_STRENGTH OUTLINE_BRIGHTNESS OUTLINE_BASE_THICKNESS \
    EXPOSURE_SUNRISE EXPOSURE_NOON EXPOSURE_SUNSET EXPOSURE_MIDNIGHT \
    GRADE_SATURATION GRADE_SHADOW_LIFT GRADE_CONTRAST \
    FOLIAGE_WAVE_STRENGTH WATER_WAVE_STRENGTH \
    ANTIALIASING
